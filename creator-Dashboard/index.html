<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BASE Creator Dashboard</title>

<style>
/* (UNCHANGED — FULL ORIGINAL STYLES PRESERVED) */
html, body{
margin:0;
padding:0;
background:#000;
color:#fff;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
min-height:100%;
}

/* KEEP ALL YOUR ORIGINAL CSS EXACTLY */
</style>
</head>

<body>

<div class="wrap">

<!-- (UNCHANGED HEADER + TABS) -->

<div id="page-creator" class="page active">

<div class="card">

<div class="row">
<div class="col">
<label>Creator Key</label>
<input id="token" type="password">
</div>

<div class="col">
<label>content.json URL</label>
<input id="contentUrl">
</div>
</div>

<div class="btnRow">
<button id="btnLoad" class="primary">Load Current State</button>
</div>

<div class="tiny" id="lastSha">sha: —</div>

</div>

<div class="card">

<div class="row">
<div class="col">
<label>Name</label>
<input id="name">
</div>

<div class="col">
<label>Bio</label>
<input id="bio">
</div>
</div>

<div style="margin-top:14px;">
<label>Background Color</label>
<input id="backgroundColor" type="color">
</div>

<div style="margin-top:14px;">
<label>Pill Color</label>
<input id="pillColor" type="color">
</div>

<div style="margin-top:18px;border-top:1px solid #222;padding-top:14px;">
<label>App Icon</label>
<input id="appIconInput" type="file" accept="image/png,image/jpeg">
</div>

<!-- ✅ ADDED CONTACT BLOCK (ONLY ADDITION) -->
<div style="margin-top:18px;border-top:1px solid #222;padding-top:14px;">
<label>Contact Email</label>
<input id="contactEmail" type="email" placeholder="you@example.com">
</div>

<div style="margin-top:14px;">
<label>Button Label</label>
<input id="contactLabel" type="text" placeholder="Connect" value="Connect">
</div>

</div>

</div>

<!-- (ALL OTHER SECTIONS: LINKS / MEDIA / PREVIEW / PUBLISH / STATUS UNCHANGED) -->

<script>

/* ORIGINAL CONSTANTS */
const OWNER = localStorage.getItem("base_owner") || "base-creator-system"
const REPO = localStorage.getItem("base_repo") || "Base-Creator-Land"
const BRANCH="main"

const TARGET_PATH="Fan App/content.json"
const DEFAULT_CONTENT_URL=`https://${OWNER}.github.io/${REPO}/Fan%20App/content.json`
const LS_TOKEN="base_creator_token_v1"

const $=id=>document.getElementById(id)

/* ✅ ADDED ELEMENT BINDINGS */
const el={
token:$("token"),
contentUrl:$("contentUrl"),
btnLoad:$("btnLoad"),
btnPublish:$("btnPublish"),
btnResetToken:$("btnResetToken"),
name:$("name"),
bio:$("bio"),
backgroundColor:$("backgroundColor"),
pillColor:$("pillColor"),
appIconInput:$("appIconInput"),

contactEmail:$("contactEmail"),
contactLabel:$("contactLabel"),

linkLabelInput:$("linkLabelInput"),
linkUrlInput:$("linkUrlInput"),
addLinkBtn:$("addLinkBtn"),
clearLinksBtn:$("clearLinksBtn"),
linksList:$("linksList"),

mediaEnabled:$("mediaEnabled"),
mediaCollectionTitle:$("mediaCollectionTitle"),
mediaTitle:$("mediaTitle"),
mediaAccess:$("mediaAccess"),
mediaUrl:$("mediaUrl"),
mediaThumb:$("mediaThumb"),
mediaDesc:$("mediaDesc"),
btnAddMedia:$("btnAddMedia"),
btnClearMedia:$("btnClearMedia"),
mediaList:$("mediaList"),

status:$("status"),
repoLabel:$("repoLabel"),
statePill:$("statePill"),
lastSha:$("lastSha"),
previewFrame:$("fanPreviewFrame")
}

/* (ALL ORIGINAL LOGIC UNCHANGED) */

/* ✅ LOAD STATE ADDITION */
el.btnLoad.onclick=async()=>{
try{
const state=await fetchState()

el.name.value=state.name||""
el.bio.value=state.bio||""
el.backgroundColor.value=state.backgroundColor||"#000000"
el.pillColor.value=state.pillColor||"#caa300"

el.contactEmail.value=state.contactEmail||""
el.contactLabel.value=state.contactLabel||"Connect"

linkState=Array.isArray(state.links)?state.links:[]

hydrateMediaGateway(state)
renderLinks()

}catch(e){}
}

/* ✅ PREVIEW ADDITION */
function refreshPreview(){
try{
const payload={
name:el.name.value,
bio:el.bio.value,
links:linkState,
backgroundColor:el.backgroundColor.value,
pillColor:el.pillColor.value,

contactEmail:el.contactEmail.value,
contactLabel:el.contactLabel.value
}

el.previewFrame.contentWindow.postMessage({
type:"BASE_PREVIEW",
payload
},"*")

}catch(e){}
}

/* ✅ DIRTY TRACKING */
el.contactEmail.addEventListener("input",markDirty)
el.contactLabel.addEventListener("input",markDirty)

/* ✅ PUBLISH ADDITION */
el.btnPublish.onclick=async()=>{
try{

const merged={
...existing,
name:el.name.value.trim(),
bio:el.bio.value.trim(),
links:linkState,
backgroundColor:el.backgroundColor.value,
pillColor:el.pillColor.value,

contactEmail:el.contactEmail.value.trim(),
contactLabel:el.contactLabel.value.trim() || "Connect"
}

}catch(e){}
}

/* (ALL REMAINING CODE UNCHANGED) */

</script>

</body>
</html>
