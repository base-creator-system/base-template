<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BASE Creator Dashboard</title>

<style>
html, body{
margin:0;
padding:0;
background:#000;
color:#fff;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
min-height:100%;
}

.wrap{
max-width:1080px;
margin:0 auto;
padding:18px 14px 40px;
box-sizing:border-box;
}

.top{
display:flex;
align-items:flex-start;
justify-content:space-between;
gap:16px;
margin-bottom:14px;
}

h1{
font-size:34px;
margin:0 0 6px 0;
letter-spacing:.2px;
}

.sub{
opacity:.72;
margin:0;
font-size:16px;
}

.pill{
border:2px solid #caa300;
border-radius:999px;
padding:10px 14px;
font-weight:600;
min-width:160px;
text-align:center;
}

.pill.ok{border-color:#2ee06b}
.pill.bad{border-color:#ff4b4b}
.pill.warn{border-color:#caa300}

.card{
border:1px solid #222;
background:#070707;
border-radius:18px;
padding:18px;
margin:18px 0;
box-shadow:0 0 0 1px rgba(255,255,255,.02) inset;
}

.row{
display:flex;
gap:14px;
flex-wrap:wrap;
}

.col{
flex:1;
min-width:240px;
}

label{
display:block;
font-size:13px;
opacity:.75;
margin-bottom:6px;
}

input,textarea,button,select{
font:inherit;
}

input,textarea,select{
width:100%;
box-sizing:border-box;
border-radius:14px;
border:1px solid #2a2a2a;
background:#000;
color:#fff;
padding:12px;
outline:none;
}

textarea{
min-height:120px;
resize:vertical;
}

input[type=color]{
height:52px;
padding:6px;
cursor:pointer;
}

.btnRow{
display:flex;
gap:12px;
flex-wrap:wrap;
margin-top:12px;
}

button{
border-radius:14px;
border:1px solid #2a2a2a;
background:#0b0b0b;
color:#fff;
padding:12px 16px;
cursor:pointer;
}

button:hover{border-color:#444}
button:disabled{opacity:.5;cursor:not-allowed}

.primary{border-color:#caa300!important}
.danger{border-color:#5a1b1b!important}

.linksList{margin-top:10px}

.linkRow{
display:flex;
align-items:center;
justify-content:space-between;
gap:10px;
padding:10px 12px;
border:1px solid #222;
border-radius:14px;
margin-top:10px;
background:#050505;
}

.linkText{
opacity:.92;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
max-width:calc(100% - 110px);
}

.tiny{
font-size:12px;
opacity:.65;
margin-top:6px;
}

.statusBox{
white-space:pre-wrap;
font-size:12px;
opacity:.75;
}
</style>
</head>

<body>

<div class="wrap">

<div class="top">
<div>
<h1>BASE Creator Dashboard</h1>
<p class="sub">Load current state first, then edit, preview, and publish.</p>
</div>
<div id="statePill" class="pill warn">STATUS: ready</div>
</div>

<div class="card">

<div class="row">
<div class="col">
<label>Creator Key</label>
<input id="token" type="password">
</div>

<div class="col">
<label>content.json URL</label>
<input id="contentUrl">
</div>
</div>

<div class="btnRow">
<button id="btnLoad" class="primary">Load Current State</button>
</div>

<div class="tiny" id="lastSha">sha: —</div>

</div>

<div class="card">
<div class="row">
<div class="col">
<label>Name</label>
<input id="name">
</div>

<div class="col">
<label>Bio</label>
<input id="bio">
</div>
</div>

<div style="margin-top:14px;">
<label>Background Color</label>
<input id="backgroundColor" type="color">
</div>

<div style="margin-top:14px;">
<label>Pill Color</label>
<input id="pillColor" type="color">
</div>
</div>

<div class="card">
<h3>Links</h3>

<div class="row">
<div class="col">
<label>Label</label>
<input id="linkLabelInput">
</div>

<div class="col">
<label>URL</label>
<input id="linkUrlInput">
</div>
</div>

<div class="btnRow">
<button id="addLinkBtn">Add Link</button>
<button id="clearLinksBtn" class="danger">Clear Links</button>
</div>

<div id="linksList" class="linksList"></div>
</div>

<div class="card">

<div class="row">
<div class="col">
<label>Email</label>
<input id="contactEmail">
</div>

<div class="col">
<label>Button Label</label>
<input id="contactLabel">
</div>
</div>

</div>

<div class="card">

<div class="row">
<div class="col">
<label>Upload Icon</label>
<input id="appIconFile" type="file">
</div>

<div class="col">
<button id="btnUpdateIcon">Update Icon</button>
</div>
</div>

</div>

<div class="card">

<div style="display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;">

<div>
<div>Repo: <span id="repoLabel"></span></div>
<div class="tiny">Target: Fan App/content.json</div>
</div>

<div style="display:flex;gap:12px;flex-wrap:wrap;">
<button id="btnPublish">Publish</button>
<button id="btnResetToken" class="danger">Reset Key</button>
</div>

</div>

</div>

<div class="card">
<h3>Status</h3>
<div id="status" class="statusBox"></div>
</div>

</div>

<script>

const OWNER="soliddreamz"
const REPO="Base-Creator-Land"
const BRANCH="main"

const TARGET_PATH="Fan App/content.json"

const DEFAULT_CONTENT_URL=`https://${OWNER}.github.io/${REPO}/Fan%20App/content.json`

const $=id=>document.getElementById(id)

const el={
token:$("token"),
contentUrl:$("contentUrl"),
btnLoad:$("btnLoad"),
btnPublish:$("btnPublish"),
btnResetToken:$("btnResetToken"),
name:$("name"),
bio:$("bio"),
backgroundColor:$("backgroundColor"),
pillColor:$("pillColor"),
linkLabelInput:$("linkLabelInput"),
linkUrlInput:$("linkUrlInput"),
addLinkBtn:$("addLinkBtn"),
clearLinksBtn:$("clearLinksBtn"),
linksList:$("linksList"),
contactEmail:$("contactEmail"),
contactLabel:$("contactLabel"),
status:$("status"),
repoLabel:$("repoLabel"),
statePill:$("statePill"),
lastSha:$("lastSha")
}

const LS_TOKEN="base_creator_token_v1"

let hasLoadedState=false
let lastRemoteSha=null
let linkState=[]

function log(t){
const s=new Date().toLocaleString()
el.status.textContent=`[${s}] ${t}\n`+el.status.textContent
}

function setPill(type,text){
el.statePill.className=`pill ${type}`
el.statePill.textContent=text
}

function enablePublishIfReady(){
const hasToken=(el.token.value||"").trim().length>0

/* FIXED HERE */
el.btnPublish.disabled=!(hasLoadedState && hasToken)
}

async function fetchState(){

const url=new URL(el.contentUrl.value||DEFAULT_CONTENT_URL)
url.searchParams.set("ts",Date.now())

const res=await fetch(url.toString(),{cache:"no-store"})
return res.json()

}

function renderLinks(){
el.linksList.innerHTML=""

linkState.forEach((l,i)=>{

const row=document.createElement("div")
row.className="linkRow"

const text=document.createElement("div")
text.className="linkText"
text.textContent=`${l.label} — ${l.url}`

const remove=document.createElement("button")
remove.textContent="Remove"

remove.onclick=()=>{
linkState.splice(i,1)
renderLinks()
enablePublishIfReady()
}

row.appendChild(text)
row.appendChild(remove)

el.linksList.appendChild(row)

})

}

el.addLinkBtn.onclick=()=>{
const label=(el.linkLabelInput.value||"").trim()
const url=(el.linkUrlInput.value||"").trim()

if(!url)return

linkState.push({label:label||url,url})

el.linkLabelInput.value=""
el.linkUrlInput.value=""

renderLinks()
enablePublishIfReady()
}

el.clearLinksBtn.onclick=()=>{
linkState=[]
renderLinks()
enablePublishIfReady()
}

el.btnLoad.onclick=async()=>{
try{

setPill("warn","STATUS: loading…")

const state=await fetchState()

el.name.value=state.name||""
el.bio.value=state.bio||""
el.backgroundColor.value=state.backgroundColor||"#000000"
el.pillColor.value=state.pillColor||"#caa300"
linkState=Array.isArray(state.links)?state.links:[]

renderLinks()

hasLoadedState=true

enablePublishIfReady()

setPill("warn","STATUS: loaded")

log("Loaded current state.")

}catch(e){

setPill("bad","STATUS: load failed")
log(e.message)

}
}

function ghHeaders(token){
return{
Accept:"application/vnd.github+json",
Authorization:`Bearer ${token}`,
"X-GitHub-Api-Version":"2022-11-28",
"Content-Type":"application/json"
}
}

function toBase64Utf8(str){
const utf8=new TextEncoder().encode(str)
let bin=""
utf8.forEach(b=>bin+=String.fromCharCode(b))
return btoa(bin)
}

function fromBase64Utf8(b64){
const bytes=Uint8Array.from(atob(b64.replace(/\s/g,"")),c=>c.charCodeAt(0))
return new TextDecoder().decode(bytes)
}

async function ghGetFileMeta(token,path){

const api=`https://api.github.com/repos/${OWNER}/${REPO}/contents/${encodeURIComponent(path)}?ref=${BRANCH}`

const res=await fetch(api,{headers:ghHeaders(token)})

if(!res.ok)throw new Error(`GitHub GET failed (${res.status})`)

return res.json()

}

async function ghPutFile(token,path,sha,contentBase64,message){

const api=`https://api.github.com/repos/${OWNER}/${REPO}/contents/${encodeURIComponent(path)}`

const body={
message,
content:contentBase64,
branch:BRANCH
}

if(sha)body.sha=sha

const res=await fetch(api,{
method:"PUT",
headers:ghHeaders(token),
body:JSON.stringify(body)
})

if(!res.ok)throw new Error(`GitHub PUT failed (${res.status})`)

return res.json()

}

el.btnPublish.onclick=async()=>{

try{

const token=el.token.value.trim()

if(!token)throw new Error("Missing creator key.")

const meta=await ghGetFileMeta(token,TARGET_PATH)

lastRemoteSha=meta.sha

const existing=JSON.parse(fromBase64Utf8(meta.content))

const merged={
...existing,
name:el.name.value.trim(),
bio:el.bio.value.trim(),
links:linkState,
backgroundColor:el.backgroundColor.value,
pillColor:el.pillColor.value
}

if(el.contactEmail.value.trim())merged.contactEmail=el.contactEmail.value.trim()
if(el.contactLabel.value.trim())merged.contactLabel=el.contactLabel.value.trim()

const result=await ghPutFile(
token,
TARGET_PATH,
lastRemoteSha,
toBase64Utf8(JSON.stringify(merged,null,2)),
"BASE publish"
)

if(result?.content?.sha){
el.lastSha.textContent=`sha: ${result.content.sha}`
}

setPill("ok","STATUS: published")
log("Publish success.")

}catch(e){

setPill("bad","STATUS: publish failed")
log(e.message)

}

}

function init(){

el.repoLabel.textContent=`${OWNER}/${REPO}@${BRANCH}`
el.contentUrl.value=DEFAULT_CONTENT_URL

const saved=localStorage.getItem(LS_TOKEN)

if(saved)el.token.value=saved

enablePublishIfReady()

}

init()

</script>

</body>
</html>
